name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [humble, jazzy]
    container:
      image: ros:${{ matrix.ros_distro }}-perception
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y python3-pip python3-colcon-common-extensions \
            ros-${{ matrix.ros_distro }}-cv-bridge \
            ros-${{ matrix.ros_distro }}-image-transport \
            ros-${{ matrix.ros_distro }}-pcl-conversions \
            ros-${{ matrix.ros_distro }}-pcl-ros \
            ros-${{ matrix.ros_distro }}-message-filters \
            ros-${{ matrix.ros_distro }}-tf2-ros \
            ros-${{ matrix.ros_distro }}-tf2-geometry-msgs \
            ros-${{ matrix.ros_distro }}-rosbag2-cpp \
            ros-${{ matrix.ros_distro }}-sensor-msgs-py \
            ros-${{ matrix.ros_distro }}-rmw-cyclonedds-cpp \
            libpcl-dev libeigen3-dev libopencv-dev
          rosdep update --rosdistro ${{ matrix.ros_distro }}
          rosdep install --from-paths . --ignore-src -y --rosdistro ${{ matrix.ros_distro }} \
            --skip-keys="ament_python" || true

      - name: Build
        run: |
          . /opt/ros/${{ matrix.ros_distro }}/setup.sh
          colcon build --cmake-args -DCMAKE_BUILD_TYPE=Release -DUSE_CUDA=OFF

      - name: Test
        run: |
          . /opt/ros/${{ matrix.ros_distro }}/setup.sh
          . install/setup.sh
          colcon test --return-code-on-test-failure
          colcon test-result --verbose

      - name: Lint Python
        run: |
          apt-get install -y python3-flake8 2>/dev/null || pip3 install --break-system-packages flake8 || pip3 install flake8
          python3 -m flake8 trackdlo_core/trackdlo_core/ trackdlo_utils/trackdlo_utils/ trackdlo_segmentation/trackdlo_segmentation/ \
            --max-line-length=150 --ignore=E501,W503,E741
